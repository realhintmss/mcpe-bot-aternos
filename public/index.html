<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width-device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <!-- Og Simple Without Img -->
  <meta property="og:title" content="Hdvej Bot Control Panel">
  <meta property="og:description" content="Control your Bedrock Bot with ease. Created by Mahib.">
  <meta property="og:type" content="website">

  <!-- Preload -->
  <link rel="preload" href="/static/style.css" as="style">

  <title>Bedrock Bot Control Panel</title>
  
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="panel">
    <h1>🛠️ Bedrock Bot Controller</h1>
    <div class="connection-status danger" id="connection-status">
        <p>Status: <span id="cstatus">Disconnected</span></p>
    </div>
    <div class="since-connect">
      <p>Connection Time:</p>
      <div class="time-window">
        <div class="hour">N/A</div>
        <span class="divider">:</span>
        <div class="minute">N/A</div>
        <span class="divider">:</span>
        <div class="second">N/A</div>
      </div>
    </div>
    <button class="btn" id="connectBtn" onclick="sendCommand('connect')">🔌 Connect</button>
    <button class="btn" id="disconnectBtn" onclick="sendCommand('disconnect')">❌ Disconnect</button>
    <button class="btn" id="pingBtn" onclick="sendCommand('ping')">📶 Check Ping</button>

    <div class="loader" id="loader"></div>
    <div class="response" id="responseBox">Response will appear here...</div>
  </div>
  <div id="popup" class="popup">
    <div class="popup-content">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <div class="content" id="popup-main-content"></div>
    </div>
  </div>

  <script>
  </script>
  <script src="/static/script.js" defer></script>
</body>
</html>
